<style>
  :root {
    --ink: #0e1117;
    --ink-light: #3a3f4b;
    --ink-muted: #7a8093;
    --gold: #c89a3b;
    --gold-light: #e8c06a;
    --gold-pale: #fdf6e3;
    --red: #b84c3a;
    --bg: #f8f5f0;
    --white: #ffffff;
    --card-bg: #ffffff;
    --border: #e8e0d4;
    --shadow: 0 4px 24px rgba(14,17,23,0.08);
    --shadow-hover: 0 12px 40px rgba(14,17,23,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    background: var(--ink);
    color: var(--white);
    padding: 80px 24px 72px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,154,59,0.18) 0%, transparent 70%);
  }
  .hero::after {
    content: '数';
    position: absolute;
    right: -40px;
    bottom: -60px;
    font-family: 'Noto Serif SC', serif;
    font-size: 320px;
    font-weight: 900;
    color: rgba(255,255,255,0.03);
    pointer-events: none;
    line-height: 1;
  }
  .hero-org {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 900;
    letter-spacing: 8px;
    color: #ffffff;
    margin-bottom: 20px;
    position: relative;
  }
  .hero-update {
    margin-top: 28px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1.5px;
    position: relative;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(200,154,59,0.15);
    border: 1px solid rgba(200,154,59,0.4);
    color: var(--gold-light);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 2px;
    margin-bottom: 28px;
    font-weight: 500;
  }
  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-bottom: 20px;
    position: relative;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--gold-light);
  }
  .hero p {
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.8;
    font-weight: 300;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 56px;
    flex-wrap: wrap;
    position: relative;
  }
  .stat-item {
    text-align: center;
  }
  .stat-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  /* ── DIVIDER ── */
  .section-header {
    padding: 56px 24px 32px;
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .section-header h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }
  .section-count {
    font-size: 13px;
    color: var(--ink-muted);
    white-space: nowrap;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 0 24px 24px;
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 12px;
    color: var(--ink-muted);
    margin-right: 4px;
    font-weight: 500;
  }
  .filter-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--ink-light);
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    border-radius: 20px;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }
  .search-input {
    margin-left: auto;
    padding: 7px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    width: 200px;
    background: var(--white);
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--gold); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    padding: 0 24px 80px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: transform .25s ease, box-shadow .25s ease;
    cursor: default;
    animation: fadeUp .4s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--gold-light);
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .card-school {
    font-size: 12px;
    color: var(--ink-muted);
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score-badge {
    background: var(--ink);
    color: var(--gold-light);
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 900;
    padding: 8px 12px;
    border-radius: 4px;
    text-align: center;
    line-height: 1;
    flex-shrink: 0;
  }
  .score-badge span {
    display: block;
    font-size: 10px;
    font-family: 'Noto Sans SC', sans-serif;
    color: rgba(255,255,255,0.4);
    margin-top: 3px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  /* Score coloring */
  .score-150 { background: #1a0a00; color: #ffd700; }
  .score-149, .score-148, .score-147, .score-146 { background: #0e1a00; color: #a8e060; }
  .score-145, .score-144, .score-143, .score-142 { background: #001520; color: #60c8e8; }

  .card-body { padding: 16px 24px 20px; }

  .comp-tag {
    display: inline-block;
    background: var(--gold-pale);
    color: #7a5a10;
    border: 1px solid rgba(200,154,59,0.3);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 12px;
    font-weight: 500;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .no-comp { display: none; }

  .exp-text {
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.7;
  }
  .exp-text::before {
    content: '▸ ';
    color: var(--gold);
    font-size: 11px;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--ink);
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 32px 24px;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* hidden class */
  .card.hidden { display: none; }

  @media (max-width: 600px) {
    .hero { padding: 56px 20px 48px; }
    .hero-stats { gap: 32px; }
    .stat-num { font-size: 32px; }
    .grid { grid-template-columns: 1fr; padding: 0 16px 60px; }
    .search-input { width: 100%; margin-left: 0; margin-top: 8px; }
  }
</style>
</head>

// Sort by score desc
teachers.sort((a,b)=>b.score-a.score);

const grid = document.getElementById('teacherGrid');
const countLabel = document.getElementById('countLabel');

function getScoreClass(s) {
  if(s===150) return 'score-150';
  if(s>=147) return 'score-149';
  if(s>=143) return 'score-145';
  return '';
}

function getAvatarColor(name) {
  const colors = [
    ['#1a1a2e','#e8c06a'],['#0d1b2a','#60c8e8'],['#1a0a00','#ffd700'],
    ['#0a1628','#a8e060'],['#1e0a1e','#f0a0d0'],['#0a1e0a','#80e880'],
  ];
  let h = 0; for(let c of name) h = (h*31+c.charCodeAt(0))%colors.length;
  return colors[h];
}

function renderCards(list) {
  grid.innerHTML = '';
  list.forEach((t, i) => {
    const [bg, fg] = getAvatarColor(t.name);
    const surname = t.name === '宋老师' ? '宋' : t.name[0];
  const displayName = surname + '老师';
  const firstChar = surname;
    const hasComp = t.comp && t.comp !== '' && t.comp !== '无' && t.comp !== '暂无';
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i % 12 * 40) + 'ms';
    card.dataset.score = t.score;
    card.dataset.comp = hasComp ? '1' : '0';
    card.dataset.name = t.name;
    card.dataset.school = t.school;
    card.innerHTML = `
      <div class="card-top">
        <div class="avatar" style="background:${bg};color:${fg}">${firstChar}</div>
        <div class="card-info">
          <div class="card-name">${displayName}</div>
          <div class="card-school">${t.school}</div>
        </div>
        <div class="score-badge ${getScoreClass(t.score)}">${t.score}<span>高考数学</span></div>
      </div>
      <div class="card-body">
        ${hasComp ? `<div class="comp-tag">🏆 ${t.comp.length>28?t.comp.slice(0,28)+'…':t.comp}</div>` : ''}
        <div class="exp-text">${t.exp}</div>
      </div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('count-label').textContent = `共 ${list.length} 位`;
}

renderCards(teachers);

// Filter logic
let currentFilter = 'all';
let currentSearch = '';

function applyFilters() {
  const cards = grid.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const score = parseInt(card.dataset.score);
    const comp = card.dataset.comp;
    const name = card.dataset.name;
    const school = card.dataset.school;
    let show = true;
    if(currentFilter === '150') show = score === 150;
    else if(currentFilter === '145+') show = score >= 145;
    else if(currentFilter === '140+') show = score >= 140;
    else if(currentFilter === '135+') show = score >= 135;
    else if(currentFilter === 'comp') show = comp === '1';
    if(currentSearch) {
      const q = currentSearch.toLowerCase();
      show = show && (name.includes(currentSearch) || school.includes(currentSearch));
    }
    card.classList.toggle('hidden', !show);
    if(show) visible++;
  });
  document.getElementById('count-label').textContent = `共 ${visible} 位`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', function() {
  currentSearch = this.value.trim();
  applyFilters();
});
